<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Busca de Empresas</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; }
    input, button { font-size: 1rem; padding: 0.5rem; }
    table { border-collapse: collapse; width: 100%; margin-top: 1rem; }
    th, td { border: 1px solid #ccc; padding: 0.5rem; }
  </style>
</head>
<body>
  <h1>Busca de Empresas</h1>
  <input type="text" id="query" placeholder="Digite nome da empresa..." />
  <button id="searchBtn">Buscar</button>

  <table id="resultTable" style="display:none;">
    <thead>
      <tr>
        <th>Nome</th>
        <th>CNPJ</th>
        <th>Cidade</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    const API_URL = "https://SEU-APP.up.railway.app/api/search";

    document.getElementById("searchBtn").onclick = async function() {
      const q = document.getElementById("query").value.trim();
      if (!q) return alert("Digite o nome da empresa!");

      const response = await fetch(`${API_URL}?q=${encodeURIComponent(q)}`);
      const data = await response.json();

      const table = document.getElementById("resultTable");
      const body = table.querySelector("tbody");
      body.innerHTML = "";

      if (Array.isArray(data) && data.length > 0) {
        data.forEach(emp => {
          const row = document.createElement("tr");
          row.innerHTML = `<td>${emp.nome}</td><td>${emp.cnpj}</td><td>${emp.cidade}</td>`;
          body.appendChild(row);
        });
        table.style.display = "";
      } else {
        table.style.display = "none";
        alert("Nenhuma empresa encontrada.");
      }
    }
  </script>
</body>
</html>
